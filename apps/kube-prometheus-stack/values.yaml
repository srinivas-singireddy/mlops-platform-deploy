# kube-prometheus-stack values
# Chart docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

# ─────────────────────────────────────────────────────────────────────
# Prometheus
# ─────────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Persist Prometheus data to EBS
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3      # gp3 is the default EBS storage class on EKS
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi          # Lab-friendly size

    # Lab-friendly resource limits
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

    # Retention — short for the lab
    retention: 7d
    retentionSize: "8GiB"

# ─────────────────────────────────────────────────────────────────────
# Grafana
# ─────────────────────────────────────────────────────────────────────
grafana:
  enabled: true

  # Admin credentials are sourced from a Kubernetes Secret synced from
  # AWS Secrets Manager via External Secrets Operator. See ADR 0007.
  # The Secret 'grafana-admin-credentials' is provisioned by the
  # ExternalSecret manifest in this same folder (external-secret.yaml).
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    storageClassName: gp3
    size: 5Gi

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

  # Default datasources — Prometheus is auto-configured by the chart
  # We'll add Loki as a datasource in a separate sidecar config (Step 5)

  # Lab-friendly: disable the load test plugin et al
  testFramework:
    enabled: false

  # Default Grafana dashboards (kube-prometheus-stack ships ~30 of them)
  defaultDashboardsEnabled: true

    # Sidecars are how Grafana auto-discovers extra datasources/dashboards
  sidecar:
    datasources:
      enabled: true
      label: grafana_datasource
    dashboards:
      enabled: true
      label: grafana_dashboard

  # Add Loki as an additional datasource via the chart's
  # additionalDataSources mechanism (alternative to sidecar approach)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

# ─────────────────────────────────────────────────────────────────────
# Alertmanager
# ─────────────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

    resources:
      requests:
        cpu: 10m
        memory: 64Mi

    # Inject Slack webhook URLs from K8s Secret created by ESO
    env:
      - name: SLACK_WEBHOOK_ALERTS
        valueFrom:
          secretKeyRef:
            name: alertmanager-credentials
            key: slack-webhook-alerts
      - name: SLACK_WEBHOOK_CRITICAL
        valueFrom:
          secretKeyRef:
            name: alertmanager-credentials
            key: slack-webhook-critical

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: "null"
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
        # Suppress Watchdog — heartbeat alert, not a real incident
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"

        # Critical → #mlops-critical
        - matchers:
            - severity = "critical"
          receiver: "slack-critical"

        # Warning → #mlops-alerts
        - matchers:
            - severity = "warning"
          receiver: "slack-warnings"

    receivers:
      - name: "null"

      - name: "slack-warnings"
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_ALERTS}"
            channel: "#mlops-alerts"
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Severity:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

      - name: "slack-critical"
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_CRITICAL}"
            channel: "#mlops-critical"
            send_resolved: true
            title: |-
              🚨 [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Severity:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ["alertname", "namespace"]
# ─────────────────────────────────────────────────────────────────────
# Cluster-level metrics — already covered by EKS, but the stack assumes
# it scrapes etcd, scheduler, controller-manager directly. On EKS those
# are managed and not scrape-able, so disable to avoid alert noise.
# ─────────────────────────────────────────────────────────────────────
kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false   # Optional — kube-proxy on EKS is fine but not on the default scrape port