apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: alertmanager-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            receiver: "null"
            group_by: ["alertname", "namespace", "severity"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - matchers:
                  - alertname = "Watchdog"
                receiver: "null"
              - matchers:
                  - severity = "critical"
                receiver: "slack-critical"
              - matchers:
                  - severity = "warning"
                receiver: "slack-warnings"
          receivers:
            - name: "null"
            - name: "slack-warnings"
              slack_configs:
                - api_url: "{{ .slackWebhookAlerts }}"
                  channel: "#mlops-alerts"
                  send_resolved: true
                  title: "[ALERT] {{ .CommonLabels.alertname }}"
                  text: "Severity: {{ .CommonLabels.severity }}"
            - name: "slack-critical"
              slack_configs:
                - api_url: "{{ .slackWebhookCritical }}"
                  channel: "#mlops-critical"
                  send_resolved: true
                  title: "CRITICAL {{ .CommonLabels.alertname }}"
                  text: "Severity: {{ .CommonLabels.severity }}"
          inhibit_rules:
            - source_matchers:
                - severity = "critical"
              target_matchers:
                - severity = "warning"
              equal: ["alertname", "namespace"]

  data:
    - secretKey: slackWebhookAlerts
      remoteRef:
        key: mlops-platform/alertmanager/slack-webhook-alerts
    - secretKey: slackWebhookCritical
      remoteRef:
        key: mlops-platform/alertmanager/slack-webhook-critical