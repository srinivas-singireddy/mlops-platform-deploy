apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: alertmanager-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Alertmanager reads this file directly — URLs injected by ESO template
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            receiver: "null"
            group_by: ["alertname", "namespace", "severity"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - matchers:
                  - alertname = "Watchdog"
                receiver: "null"
              - matchers:
                  - severity = "critical"
                receiver: "slack-critical"
              - matchers:
                  - severity = "warning"
                receiver: "slack-warnings"
          receivers:
            - name: "null"
            - name: "slack-warnings"
              slack_configs:
                - api_url: "{{ index . \"slack-webhook-alerts\" }}"
                  channel: "#mlops-alerts"
                  send_resolved: true
                  title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
                  text: "{{ range .Alerts }}*Summary:* {{ .Annotations.summary }}\n*Severity:* {{ .Labels.severity }}\n{{ end }}"
            - name: "slack-critical"
              slack_configs:
                - api_url: "{{ index . \"slack-webhook-critical\" }}"
                  channel: "#mlops-critical"
                  send_resolved: true
                  title: "🚨 [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
                  text: "{{ range .Alerts }}*Summary:* {{ .Annotations.summary }}\n*Severity:* {{ .Labels.severity }}\n{{ end }}"
          inhibit_rules:
            - source_matchers:
                - severity = "critical"
              target_matchers:
                - severity = "warning"
              equal: ["alertname", "namespace"]

  data:
    - secretKey: slack-webhook-alerts
      remoteRef:
        key: mlops-platform/alertmanager/slack-webhook-alerts
    - secretKey: slack-webhook-critical
      remoteRef:
        key: mlops-platform/alertmanager/slack-webhook-critical