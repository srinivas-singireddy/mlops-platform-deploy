# CORRECTED apps/loki/values.yaml

# ─────────────────────────────────────────────────────────────────────
# Top-level: which mode to deploy in
# ─────────────────────────────────────────────────────────────────────
deploymentMode: Monolithic

# ─────────────────────────────────────────────────────────────────────
# Loki server config (separate from deployment-mode choice)
# ─────────────────────────────────────────────────────────────────────
loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

  limits_config:
    retention_period: 168h
    allow_structured_metadata: true

  analytics:
    reporting_enabled: false

# ─────────────────────────────────────────────────────────────────────
# Monolithic mode pod configuration
# ─────────────────────────────────────────────────────────────────────
singleBinary:
  replicas: 1

  persistence:
    enabled: true
    storageClass: gp3
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# ─────────────────────────────────────────────────────────────────────
# Disable other deployment modes
# ─────────────────────────────────────────────────────────────────────
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# ─────────────────────────────────────────────────────────────────────
# Disable supporting components for lab simplicity
# ─────────────────────────────────────────────────────────────────────
gateway:
  enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false