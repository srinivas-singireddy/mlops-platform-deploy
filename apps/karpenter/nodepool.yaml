apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        provisioner: karpenter

    spec:
      # Link to the EC2NodeClass above.
      # This is how NodePool (cloud-agnostic) references EC2NodeClass (AWS-specific).
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        # Multiple instance families = Spot reliability.
        # If t3.medium has no Spot capacity in eu-central-1a,
        # Karpenter immediately tries t3a.medium, m5.large, etc.
        # Single instance type = most common cause of Spot provisioning failure.
        - key: "node.kubernetes.io/instance-type"
          operator: In
          values:
            - t3.medium
            - t3.large
            - t3a.medium
            - t3a.large
            - m5.large
            - m5.xlarge
            - m6i.large
            - m6i.xlarge

        # Only provision in your two AZs
        - key: "topology.kubernetes.io/zone"
          operator: In
          values:
            - eu-central-1a
            - eu-central-1b

        # Prefer Spot, fall back to on-demand if Spot unavailable
        - key: "karpenter.sh/capacity-type"
          operator: In
          values:
            - spot
            - on-demand

        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]

        - key: "kubernetes.io/os"
          operator: In
          values: ["linux"]

  # Hard cost safety net — Karpenter will not provision beyond these totals.
  # A pod that would breach the limit stays Pending rather than causing runaway spend.
  limits:
    cpu: "8"
    memory: "32Gi"

  disruption:
    # WhenUnderutilized: Karpenter actively bin-packs pods and deletes
    # underutilised nodes. This is what saves money automatically.
    consolidationPolicy: WhenEmptyOrUnderutilized

    # 30s is aggressive — good for a lab (saves money fast).
    # Production would use 5m to avoid disruption during traffic spikes.
    consolidateAfter: 30s

    # Never disrupt more than 1 node at a time.
    # Prevents consolidation from draining all nodes simultaneously.
    # This is the Lesson 20 guard — simultaneous drain breaks addon reconciliation.
    budgets:
      - nodes: "1"