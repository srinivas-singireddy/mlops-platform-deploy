apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "node.kubernetes.io/instance-type"
          operator: In
          values:
            - t3.medium
            - t3.large
            - t3a.medium
            - t3a.large
            - m5.large
            - m5.xlarge
            - m6i.large
            - m6i.xlarge
        - key: "topology.kubernetes.io/zone"
          operator: In
          values:
            - eu-central-1a
            - eu-central-1b
        - key: "karpenter.sh/capacity-type"
          operator: In
          values:
            - spot
            - on-demand
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
        - key: "kubernetes.io/os"
          operator: In
          values: ["linux"]

  limits:
    cpu: "8"
    memory: "32Gi"

  disruption:
    # v1 API: WhenEmptyOrUnderutilized replaces WhenUnderutilized
    consolidationPolicy: WhenEmptyOrUnderutilized
    # v1 API: consolidateAfter is required when using WhenEmptyOrUnderutilized
    consolidateAfter: 30s
    budgets:
      - nodes: "1"