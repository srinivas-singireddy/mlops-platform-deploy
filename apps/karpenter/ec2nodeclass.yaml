apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # v1 API requires amiSelectorTerms (not amiFamily)
  # alias: al2023@latest is valid in v1
  amiSelectorTerms:
    - alias: al2023@latest

  role: "karpenter-node-mlops-lab"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "mlops-lab"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "mlops-lab"

  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required

  tags:
    Project: "mlops-platform"
    ManagedBy: "karpenter"
    KubernetesCluster: "mlops-lab"