apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # AL2023 is the modern Amazon Linux for EKS.
  # "alias: al2023@latest" tells Karpenter to query SSM Parameter Store
  # at provisioning time to resolve the current AMI ID for your K8s version.
  # You never hardcode an AMI ID — it changes with every security patch.
  amiSelectorTerms:
    - alias: al2023@latest

  # The IAM role name (not ARN) that Karpenter attaches to every node it launches.
  # Karpenter resolves the instance profile from this role name automatically.
  # Matches aws_iam_role.karpenter_node in karpenter-iam.tf.
  role: "karpenter-node-mlops-lab"

  # Karpenter finds subnets by querying EC2 for subnets tagged with this key=value.
  # Matches the tag you added to modules/vpc/main.tf.
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "mlops-lab"

  # Karpenter finds security groups by this tag.
  # Matches node_security_group_tags in terraform/cluster/main.tf.
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "mlops-lab"

# IMDSv2 with hop limit 2 — required for kubelet to reach IMDS
  # during bootstrap. Hop limit 1 (the default) blocks containerized
  # processes from accessing instance metadata.
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2    # was 1 — this was blocking kubelet bootstrap
    httpTokens: required          # keep IMDSv2 enforced for security


  # Tags applied to every EC2 instance Karpenter launches.
  # Visible in AWS Console and Cost Explorer.
  tags:
    Project: "mlops-platform"
    ManagedBy: "karpenter"
    KubernetesCluster: "mlops-lab"